  如何写质量报告？
本项目严格遵循《武汉天图地信科技有限公司测绘地理信息技术和质量管理暂行办法(试行)》及ISO9001质量管理体系标准，规范项目全流程实施，确保项目各环节流程合规、成果达标；围绕“功能完备、运行稳定、性能优良、体验良好”四大核心目标，明确项目质量要求与量化指标，构建全流程质量管理体系，具体如下：
功能性目标：系统需全面实现视频流数据变换处理、三维视频融合、目标识别与事件识别等核心功能模块，各模块功能衔接顺畅、运行正常，能够充分满足自然资源监测场景的实际业务需求，实现多源数据融合、智能分析与可视化展示的一体化应用。
性能指标：严格保障目标识别高准确率与系统高可用性，确保系统在广域复杂场景下能够稳定运行，满足实时性、精准性要求，各项性能指标达到项目技术规范标准，为自然资源监测业务提供可靠支撑。
为确保质量目标落地实现，项目建立全流程质量管理流程，覆盖项目实施的各个阶段，形成“策划—控制—验证—评审”的闭环管理，具体流程如下：
（1）质量策划：结合项目需求与技术标准，制定完善的项目质量标准、验收规范与评测方法，明确各环节质量控制要点、责任分工及验收标准，形成质量策划方案，为项目质量管理提供指导依据。
（2）过程控制：在项目实施过程中，针对算法设计、系统开发、数据集构建、模型训练等关键环节，设定标准化技术审查节点，组织技术专家对各环节成果进行严格审查，及时发现并纠正质量问题，确保过程质量可控。
（3）测试验证：采用自动化测试、实地部署测试与用户反馈三位一体的闭环验证方式，对系统功能、性能、稳定性、兼容性等进行全面测试；自动化测试覆盖核心算法与系统模块，实地部署测试模拟真实应用场景，用户反馈收集实际应用中的问题与优化建议，确保系统质量符合实际应用需求。
（4）质量评审：每阶段工作完成后，组织内部技术专家与外部行业专家联合开展质量评审会，对阶段成果的质量、技术水平、合规性进行全面评价，形成评审意见，针对存在的问题及时整改优化，确保阶段成果达标后再进入下一阶段工作。
如何写档案管理办法？
    项目档案管理严格遵守《武汉天图地信科技有限公司测绘地理信息成果与资料档案管理暂行办法(试行)》，重点落实以下要求：
（1）测绘项目组应归档和保管的测绘成果与资料档案主要包括：项目的合同或协议等立项材料；项目相关的采购活动和外协事项、财务收支等过程材料；测绘成果检查和质量检验报告、项目验收意见书等结题验收材料。项目组应按照科研管理办公室另行下发的详细清单，实施规范化管理；及时汇总测绘成果和资料档案清单，连同上述材料的扫描件，及时送交科研管理办公室；涉密测绘成果资料应送交实验室指定的专门机构保管，确保涉密档案安全。
（2）科研管理办公室应归档和保管的测绘成果与资料档案主要包括：所有相关规章制度原件、上级主管部门下达的各类管理文件、由科研管理部门组织的相关活动的原始记录、测绘成果与资料档案(含相关合同)的电子版本、测绘成果与资料档案索引、档案销毁清册以及其他应保存的相关资料等。
（3）实验室各级档案管理责任单位(办公室)应根据国家相关政策规章要求，将测绘成果与资料档案分类立卷，案卷标题简明确切，案卷质量符合有关规范要求；制定明确的档案归档范围及保管期限表，保管期限分为永久、30年、10年三种，过程性资料保管期限可为项目结题后5年，确保档案保管规范、有序。
（4）各级档案管理责任单位开展测绘成果与资料档案的接收和移交工作时，必须按照内容清单严格清点，履行签字确认手续，并填写移交登记表一式两份，双方各留存一份；及时对保管和接收的档案进行整理、组卷、归档、入库，当年接收的档案原则上应于当年完成归档工作，确保档案及时归档。
（5）科研管理办公室制作归档的成果与资料的完整登记表，各级档案管理单位做好登记造册工作，长期保存登记表，并将登记信息录入计算机系统，实现档案信息的数字化管理，便利档案的快速查阅与规范使用。
（6）各级档案管理责任单位对存储测绘成果与资料数据的计算机、网络和各类存储介质(以下简称存储设备)，分类分级实施安全防护，实行灾备化管理；须对测绘成果与资料数据档案进行双备份并异地存放，定期抽检数字档案介质，及时将到期介质上的数字档案迁移至新介质，防止数据丢失或损坏。
（7）各级档案管理责任单位应当对存储设备定期开展安全检查、安全评估和安全加固等工作，及时发现并消除安全隐患；若存储设备发生硬件故障或需要数据恢复，需送外部进行维修恢复时，应采取可靠的安全防护措施，加强数据保护，防止数据泄露；存储设备报废前，应按照相关规程进行信息清除操作，彻底删除设备中的档案数据，防止信息泄露。
（8）涉密测绘成果存储设备的安全防护管理，严格遵循实验室涉密设备管理相关制度，采取加密存储、权限管控等专项防护措施，确保涉密档案安全。

    function SearchPOI(bs){
        var rA=[];
        var resultArray=[];
        var options = {
       pageCapacity : 50 //设置每页显示50个数据
        };



        var  local  = new BMap.LocalSearch(map, options);
        local.searchInBounds("停车场",bs);//范围搜索 关键字
        //搜索结束后的回调函数
        local.setSearchCompleteCallback(
                function(results){

                // 判断状态是否正确
                if (local.getStatus() == BMAP_STATUS_SUCCESS){

                    var totalResults = results.getNumPois();
                    var totalPages = results.getNumPages();
                    var currPage = results.getPageIndex();// 获取当前是第几页数据
                    //alert("totalResults:" + totalResults);
                    for (let i = 0; i < results.getCurrentNumPois(); i++) {
                    resultArray[50 * currPage + i] = results.getPoi(i);//在当前页面下获取页面中的内容
                    }

                    if (results.getPageIndex() < results.getNumPages() - 1) {
                        local.gotoPage(results.getPageIndex() + 1); // 遍历到最后一页之后不再进行下一页搜索，此时，已经获取到全部的搜索结果，
                    } else {// 已经到达最后一页结果

                       console.log("全部结果有：" + resultArray.length + "------原本搜索结果有：" + results.getNumPois());
                        //在新页面中打开 s
                        //    console.log(s);

                        //存储数据
                          var db = getCurrentDb();
                          for(let k=0;k<resultArray.length;k++){
                        //使用闭包遍历数组  防止遍历失败
                                (function(arg){
                                    let txtName= resultArray[k].title;
                                    let txtPhone= resultArray[k].phoneNumber;
                                   let txtAddress= resultArray[k].address;

                                    let txtLon= resultArray[k].point.lng;
                                    let txtLat= resultArray[k].point.lat;


                                    //执行sql脚本，插入数据
                                    db.transaction(function (trans) {
                                        trans.executeSql("insert into PZ(title,phone,address,lon,lat) values(?,?,?,?,?) ", [txtName,txtPhone,txtAddress, txtLon, txtLat], function (ts, data) {
                                        }, function (ts, message) {
                                            alert(message);
                                        });
                                    });



                                })(k);//

                             }

                }

                }




        });

        return ;

    }

        db.transaction(function (trans) {//启动一个事务，并设置回调函数
            //执行创建表的Sql脚本
            trans.executeSql("create table if not exists PZ(title text null,phone text null,address text null,lon double null,lat double null)", [], function (trans, result) {
            }, function (trans, message) {//消息的回调函数alert(message);});
            }, function (trans, result) {
            }, function (trans, message) {
            });
        })
    }
